<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>StarClip — Administration</title>
<style>
  :root{--bg:#100D16;--panel:#1A1523;--up:#241D30;--line:#352B45;--gold:#F2B33D;--text:#EFEAF7;--dim:#9C92AE;--ok:#5DD9A0;--err:#F26D6D;}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;padding:24px 16px 60px}
  .wrap{max-width:560px;margin:0 auto}
  h1{font-size:26px;margin-bottom:4px}h1 span{color:var(--gold)}
  .sub{color:var(--dim);font-size:13px;margin-bottom:20px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px;margin-top:14px}
  label{display:block;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin:12px 0 6px}
  input{width:100%;background:var(--up);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:11px 12px;font-size:16px}
  button{width:100%;margin-top:14px;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--gold),#E08E2B);color:#1A1204;font-weight:800;font-size:15px;cursor:pointer}
  button.ghost{background:transparent;border:1px solid var(--gold);color:var(--gold)}
  .codes{margin-top:14px}
  .codebox{background:var(--up);border:1px solid var(--gold);border-radius:10px;padding:14px;text-align:center;font-size:24px;font-weight:800;letter-spacing:2px;color:var(--gold);margin-top:8px}
  table{width:100%;margin-top:12px;border-collapse:collapse;font-size:14px}
  td,th{padding:8px 6px;border-bottom:1px solid var(--line);text-align:left}
  .ok{color:var(--ok)}.err{color:var(--err)}.dim{color:var(--dim)}
  #msg{margin-top:10px;font-size:13.5px;line-height:1.5}
</style>
<script src="config.js"></script>
</head>
<body>
<div class="wrap">
  <h1>⭐ Star<span>Clip</span> — Administration</h1>
  <p class="sub">Réservé au patron du studio. Crée ici les codes que tu vends sur WhatsApp.</p>

  <div class="card">
    <label>Ton PIN d'administrateur</label>
    <input type="password" id="pin" placeholder="Le PIN configuré dans Cloudflare" inputmode="numeric">
    <label>Nombre de vidéos par code</label>
    <input type="number" id="videos" value="1" min="1" max="100">
    <label>Nombre de codes à créer</label>
    <input type="number" id="count" value="1" min="1" max="20">
    <button id="create">🎟️ Créer le(s) code(s)</button>
    <div id="msg"></div>
    <div class="codes" id="newCodes"></div>
  </div>

  <div class="card">
    <label>Clé fal.ai (à coller une seule fois, ou pour la remplacer)</label>
    <input type="text" id="falkey" placeholder="Colle ici ta clé fal.ai (fal.ai → Keys → Copie Clé)" autocapitalize="off" autocorrect="off">
    <button id="savekey">🔑 Enregistrer la clé</button>
    <div id="keymsg" style="margin-top:10px; font-size:13.5px; line-height:1.5;"></div>
  </div>

  <div class="card">
    <button class="ghost" id="list">📋 Voir tous les codes et leurs soldes</button>
    <div id="listOut"></div>
  </div>
</div>
<script>
const $ = id => document.getElementById(id);
async function api(path, body) {
  if (WORKER_URL.includes("COLLE_ICI")) throw new Error("Configure d'abord config.js avec l'adresse du Worker.");
  const r = await fetch(WORKER_URL + path, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify(body) });
  const d = await r.json().catch(()=>({}));
  if (!r.ok) throw new Error(d.error || ("Erreur " + r.status));
  return d;
}
$("savekey").onclick = async () => {
  $("keymsg").innerHTML = "Enregistrement…";
  try {
    const d = await api("/admin/setkey", { pin: $("pin").value.trim(), key: $("falkey").value });
    $("keymsg").innerHTML = `<span class="ok">✓ Clé enregistrée (${d.longueur} caractères, commence par ${d.debut}). Teste maintenant une génération dans l'app.</span>`;
    $("falkey").value = "";
  } catch (e) { $("keymsg").innerHTML = `<span class="err">✗ ${e.message}</span>`; }
};

$("create").onclick = async () => {
  $("msg").innerHTML = "Création…"; $("newCodes").innerHTML = "";
  try {
    const d = await api("/admin/create", { pin: $("pin").value.trim(), videos: $("videos").value, count: $("count").value });
    $("msg").innerHTML = `<span class="ok">✓ ${d.codes.length} code(s) créé(s) — ${d.videos} vidéo(s) chacun. Envoie-le(s) au client sur WhatsApp :</span>`;
    d.codes.forEach(c => { const b = document.createElement("div"); b.className = "codebox"; b.textContent = c; $("newCodes").appendChild(b); });
  } catch (e) { $("msg").innerHTML = `<span class="err">✗ ${e.message}</span>`; }
};
$("list").onclick = async () => {
  $("listOut").innerHTML = "Chargement…";
  try {
    const d = await api("/admin/list", { pin: $("pin").value.trim() });
    let h = "<table><tr><th>Code</th><th>Restantes</th><th>Utilisées</th></tr>";
    d.codes.forEach(c => h += `<tr><td><b>${c.code}</b></td><td class="${c.left>0?'ok':'dim'}">${c.left}/${c.total}</td><td>${c.used}</td></tr>`);
    $("listOut").innerHTML = h + "</table>";
  } catch (e) { $("listOut").innerHTML = `<span class="err">✗ ${e.message}</span>`; }
};
</script>
</body>
</html>
